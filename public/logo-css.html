<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo CSS Puro - NeurAI Dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #08111f;
    }

    /* ─────────────────────────────
       VARIABLES
    ───────────────────────────── */
    :root {
      --skin:        #c8784a;
      --skin-dark:   #a05c30;
      --skin-shadow: #7a3e18;
      --robot:       #1e4a7a;
      --robot-light: #2e6aa0;
      --robot-dark:  #102840;
      --robot-line:  #1a3a5c;
      --blue-glow:   #00ccff;
      --blue-bright: #00eeff;
      --hair:        #151008;
      --jersey:      #142850;
      --outline:     #0a1520;
      --bg:          #08111f;
    }

    /* ─────────────────────────────
       ANIMACIONES
    ───────────────────────────── */

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.013); }
    }

    @keyframes eyeGlow {
      0%, 100% {
        box-shadow:
          0 0  8px 2px var(--blue-glow),
          0 0 20px 6px var(--blue-glow),
          inset 0 0 10px rgba(0,200,255,0.4);
      }
      50% {
        box-shadow:
          0 0 16px 5px var(--blue-bright),
          0 0 40px 14px var(--blue-bright),
          0 0 70px 20px rgba(0,200,255,0.3),
          inset 0 0 18px rgba(0,220,255,0.6);
      }
    }

    @keyframes irisPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.8; }
    }

    @keyframes scanline {
      0%   { top: 2px;  opacity: 0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.7; }
      100% { top: calc(100% - 4px); opacity: 0; }
    }

    @keyframes coreBlink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes segFlicker {
      0%, 88%, 100% { opacity: 1; }
      90% { opacity: 0.15; }
      91% { opacity: 1; }
      93% { opacity: 0.4; }
      94% { opacity: 1; }
    }

    @keyframes glint {
      0%, 75%, 100% { opacity: 0; transform: scale(0.5); }
      80%           { opacity: 1; transform: scale(1.2); }
      85%           { opacity: 0; transform: scale(1); }
    }

    @keyframes hairFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-2px); }
    }

    /* ─────────────────────────────
       CONTENEDOR PRINCIPAL
    ───────────────────────────── */
    .logo {
      position: relative;
      width: 260px;
      animation: breathe 4s ease-in-out infinite;
    }

    /* ─────────────────────────────
       CABEZA
    ───────────────────────────── */
    .head {
      position: relative;
      width: 260px;
      height: 300px;
      border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
      overflow: hidden;
      border: 3px solid var(--outline);
    }

    /* Mitad izquierda — piel humana */
    .head-human {
      position: absolute;
      inset: 0;
      width: 50%;
      background: linear-gradient(160deg, #d4895a 0%, #c07848 40%, #a05c30 100%);
    }

    /* Sombras cara humana */
    .head-human::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 55%;
      background: linear-gradient(to bottom, transparent, rgba(80,30,5,0.35));
    }
    .head-human::after {
      content: '';
      position: absolute;
      top: 30%; left: 0;
      width: 60%; height: 40%;
      background: radial-gradient(ellipse at 30% 50%, rgba(80,30,5,0.25), transparent 70%);
    }

    /* Mitad derecha — robot */
    .head-robot {
      position: absolute;
      inset: 0;
      left: 50%;
      width: 50%;
      background: linear-gradient(160deg, #2e6aa0 0%, #1e4a7a 50%, #102840 100%);
    }

    /* Panel frontal robot más claro */
    .head-robot::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(60,130,190,0.5) 0%, transparent 60%);
    }

    /* Línea divisoria */
    .divider {
      position: absolute;
      top: 0; left: 50%;
      width: 3px;
      height: 100%;
      background: var(--outline);
      transform: translateX(-50%);
      z-index: 10;
    }

    /* ─────────────────────────────
       PELO
    ───────────────────────────── */
    .hair {
      position: absolute;
      top: -18px;
      left: -6px;
      width: 272px;
      height: 95px;
      background: var(--hair);
      border-radius: 50% 50% 0 0 / 80% 80% 0 0;
      z-index: 20;
      animation: hairFloat 4s ease-in-out infinite;
      border: 2.5px solid #0a0804;
    }

    /* Mechones izquierda */
    .hair::before {
      content: '';
      position: absolute;
      bottom: -8px; left: -4px;
      width: 60px; height: 35px;
      background: var(--hair);
      border-radius: 0 0 50% 50%;
      border-bottom: 2px solid #0a0804;
    }

    /* Mechones derecha */
    .hair::after {
      content: '';
      position: absolute;
      bottom: -6px; right: 10px;
      width: 50px; height: 28px;
      background: var(--hair);
      border-radius: 0 0 50% 60%;
      border-bottom: 2px solid #0a0804;
    }

    /* ─────────────────────────────
       CEJA IZQUIERDA (humana)
    ───────────────────────────── */
    .eyebrow-left {
      position: absolute;
      top: 82px; left: 22px;
      width: 88px; height: 12px;
      background: #1a0f05;
      border-radius: 50% 30% 30% 50% / 60% 60% 40% 40%;
      transform: rotate(-6deg);
      z-index: 5;
    }

    /* ─────────────────────────────
       OJO IZQUIERDO (humano)
    ───────────────────────────── */
    .eye-human {
      position: absolute;
      top: 100px; left: 20px;
      width: 80px; height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    /* Blanco del ojo */
    .eye-human-white {
      width: 68px; height: 36px;
      background: #f0ece4;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      border: 2px solid #1a0f05;
    }

    /* Iris */
    .eye-human-white::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 24px; height: 24px;
      background: radial-gradient(circle, #2a1205 40%, #3d1e08 100%);
      border-radius: 50%;
    }

    /* Pupila */
    .eye-human-white::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      width: 12px; height: 12px;
      background: #080402;
      border-radius: 50%;
      box-shadow: 4px -4px 0 3px rgba(255,255,255,0.75);
    }

    /* Párpado superior */
    .eyelid-top {
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 12px;
      background: var(--skin);
      border-radius: 50% 50% 0 0;
      background: linear-gradient(to bottom, #c07848, transparent);
      pointer-events: none;
    }

    /* ─────────────────────────────
       NARIZ
    ───────────────────────────── */
    .nose {
      position: absolute;
      top: 155px; left: 95px;
      width: 28px; height: 45px;
      z-index: 5;
    }

    .nose::before {
      content: '';
      position: absolute;
      bottom: 0; left: -10px;
      width: 20px; height: 18px;
      border-radius: 50% 0 0 50%;
      border-left: 3px solid rgba(80,30,5,0.6);
      border-bottom: 3px solid rgba(80,30,5,0.5);
    }

    .nose::after {
      content: '';
      position: absolute;
      bottom: 8px; right: 2px;
      width: 3px; height: 28px;
      background: rgba(80,30,5,0.4);
      border-radius: 2px;
      transform: rotate(5deg);
    }

    /* ─────────────────────────────
       BOCA
    ───────────────────────────── */
    .mouth {
      position: absolute;
      top: 215px; left: 32px;
      width: 130px; height: 30px;
      z-index: 5;
    }

    /* Línea sonrisa */
    .mouth::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-bottom: 3px solid rgba(80,30,5,0.65);
      border-radius: 0 0 60% 60% / 0 0 80% 80%;
    }

    /* Labio inferior */
    .mouth::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20%;
      width: 55%; height: 12px;
      background: rgba(160,80,40,0.4);
      border-radius: 50%;
    }

    /* ─────────────────────────────
       CEJA ROBOT
    ───────────────────────────── */
    .eyebrow-robot {
      position: absolute;
      top: 82px; left: 142px;
      width: 88px; height: 13px;
      background: #1a3a5c;
      border-radius: 30% 50% 50% 30% / 60% 60% 40% 40%;
      transform: rotate(-4deg);
      z-index: 5;
      border: 1.5px solid #0f2035;
    }

    /* ─────────────────────────────
       OJO ROBOT
    ───────────────────────────── */
    .eye-robot {
      position: absolute;
      top: 96px; left: 148px;
      width: 82px; height: 82px;
      border-radius: 50%;
      z-index: 6;
    }

    /* Socket oscuro */
    .eye-socket {
      position: absolute;
      inset: -8px;
      background: #081828;
      border-radius: 50%;
      border: 3px solid #0a1a28;
    }

    /* Anillo exterior metálico */
    .eye-ring-outer {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 4px solid #1e5080;
      animation: eyeGlow 2.8s ease-in-out infinite;
    }

    /* Anillo giratorio con marcas */
    .eye-ring-rotate {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      border: 2px dashed rgba(0,160,220,0.4);
      animation: ringRotate 8s linear infinite;
    }

    /* Superficie del ojo */
    .eye-surface {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 45% 42%,
        #d0f5ff 0%,
        #70d8ff 20%,
        #00aadd 45%,
        #005888 80%,
        #002840 100%
      );
      overflow: hidden;
    }

    /* Iris pulsante */
    .eye-iris {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%,
        #50d8f8 0%,
        #0099cc 40%,
        #004870 100%
      );
      border: 2px solid rgba(0,180,240,0.5);
      animation: irisPulse 2.8s ease-in-out infinite;
    }

    /* Pupila */
    .eye-pupil {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #002030;
    }

    /* Núcleo brillante */
    .eye-core {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0%, #b0f0ff 60%, #00ccff 100%);
      animation: coreBlink 2.8s ease-in-out infinite;
    }

    /* Scanline */
    .eye-scanline {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent, #00eeff, transparent);
      border-radius: 2px;
      animation: scanline 2.6s linear infinite;
    }

    /* Destello especular */
    .eye-glint {
      position: absolute;
      top: 14px; left: 14px;
      width: 18px; height: 10px;
      border-radius: 50%;
      background: white;
      opacity: 0;
      filter: blur(2px);
      animation: glint 5s ease-in-out infinite;
    }

    /* ─────────────────────────────
       SEGMENTOS ROBOT
       (líneas decorativas lado derecho)
    ───────────────────────────── */
    .segments {
      position: absolute;
      inset: 0;
      left: 50%;
      width: 50%;
      z-index: 4;
      animation: segFlicker 7s ease-in-out infinite;
    }

    /* Cada segmento es un pseudo-elemento o div */
    .seg {
      position: absolute;
      background: var(--robot-line);
      border-radius: 2px;
    }

    /* Línea temporal superior */
    .seg-1 {
      top: 42px; left: 10px;
      width: 100px; height: 2.5px;
      transform: rotate(8deg);
      opacity: 0.7;
    }

    /* Línea mejilla */
    .seg-2 {
      top: 170px; left: 8px;
      width: 90px; height: 2px;
      transform: rotate(4deg);
      opacity: 0.65;
    }

    /* Línea mandíbula */
    .seg-3 {
      top: 235px; left: 5px;
      width: 85px; height: 2px;
      transform: rotate(6deg);
      opacity: 0.6;
    }

    /* Línea vertical central */
    .seg-4 {
      top: 35px; left: 38px;
      width: 2px; height: 230px;
      opacity: 0.55;
    }

    /* Línea vertical lateral */
    .seg-5 {
      top: 45px; left: 78px;
      width: 2px; height: 185px;
      opacity: 0.5;
    }

    /* Línea curva lateral — oreja robot */
    .seg-6 {
      top: 80px; left: 108px;
      width: 2px; height: 130px;
      border-radius: 0 50% 50% 0;
      opacity: 0.55;
    }

    /* ─────────────────────────────
       OREJA IZQUIERDA (humana)
    ───────────────────────────── */
    .ear-left {
      position: absolute;
      top: 115px; left: -16px;
      width: 22px; height: 38px;
      background: linear-gradient(to right, #a05c30, #c07848);
      border-radius: 50% 20% 30% 50% / 50% 30% 50% 50%;
      border: 2.5px solid var(--outline);
      z-index: 1;
    }

    /* ─────────────────────────────
       OREJA DERECHA (robot)
    ───────────────────────────── */
    .ear-right {
      position: absolute;
      top: 115px; right: -14px;
      width: 20px; height: 36px;
      background: linear-gradient(to left, #102840, #1e4a7a);
      border-radius: 20% 50% 50% 30% / 30% 50% 50% 50%;
      border: 2.5px solid var(--outline);
      z-index: 1;
    }

    /* Detalle oreja robot */
    .ear-right::after {
      content: '';
      position: absolute;
      top: 8px; left: 4px;
      width: 8px; height: 20px;
      background: #0d2030;
      border-radius: 2px;
    }

    /* ─────────────────────────────
       CUELLO Y JERSEY
    ───────────────────────────── */
    .neck {
      position: relative;
      width: 260px;
      height: 80px;
      margin-top: -4px;
      overflow: hidden;
    }

    /* Cuello humano */
    .neck-human {
      position: absolute;
      top: 0; left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(to bottom, #c07848, #a05c30);
    }

    /* Cuello robot */
    .neck-robot {
      position: absolute;
      top: 0; left: 50%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to bottom, #1e4a7a, #102840);
    }

    /* Líneas cuello robot */
    .neck-robot::before {
      content: '';
      position: absolute;
      top: 0; left: 22%;
      width: 2px; height: 100%;
      background: rgba(0,80,130,0.5);
    }
    .neck-robot::after {
      content: '';
      position: absolute;
      top: 0; left: 55%;
      width: 2px; height: 100%;
      background: rgba(0,80,130,0.5);
    }

    /* Jersey */
    .jersey {
      position: relative;
      width: 260px;
      height: 60px;
      border-radius: 0 0 20px 20px;
      overflow: hidden;
    }

    .jersey-human {
      position: absolute;
      inset: 0;
      width: 50%;
      background: #142850;
    }

    .jersey-robot {
      position: absolute;
      inset: 0;
      left: 50%;
      width: 50%;
      background: #0e1e38;
    }

    /* Línea cuello jersey */
    .jersey::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 3px;
      background: #0a1628;
      border-radius: 0 0 50% 50%;
    }

    /* Borde outline jersey */
    .jersey::after {
      content: '';
      position: absolute;
      inset: 0;
      border-top: 2.5px solid var(--outline);
    }

  </style>
</head>
<body>

<div class="logo">

  <!-- CABEZA -->
  <div class="head">
    <div class="head-human"></div>
    <div class="head-robot"></div>
    <div class="divider"></div>

    <!-- PELO -->
    <div class="hair"></div>

    <!-- CEJAS -->
    <div class="eyebrow-left"></div>
    <div class="eyebrow-robot"></div>

    <!-- OJO HUMANO -->
    <div class="eye-human">
      <div class="eye-human-white">
        <div class="eyelid-top"></div>
      </div>
    </div>

    <!-- OJO ROBOT -->
    <div class="eye-robot">
      <div class="eye-socket"></div>
      <div class="eye-ring-outer"></div>
      <div class="eye-ring-rotate"></div>
      <div class="eye-surface">
        <div class="eye-iris"></div>
        <div class="eye-pupil"></div>
        <div class="eye-core"></div>
        <div class="eye-scanline"></div>
        <div class="eye-glint"></div>
      </div>
    </div>

    <!-- NARIZ -->
    <div class="nose"></div>

    <!-- BOCA -->
    <div class="mouth"></div>

    <!-- SEGMENTOS ROBOT -->
    <div class="segments">
      <div class="seg seg-1"></div>
      <div class="seg seg-2"></div>
      <div class="seg seg-3"></div>
      <div class="seg seg-4"></div>
      <div class="seg seg-5"></div>
      <div class="seg seg-6"></div>
    </div>

    <!-- OREJAS -->
    <div class="ear-left"></div>
    <div class="ear-right"></div>
  </div>

  <!-- CUELLO -->
  <div class="neck">
    <div class="neck-human"></div>
    <div class="neck-robot"></div>
  </div>

  <!-- JERSEY -->
  <div class="jersey">
    <div class="jersey-human"></div>
    <div class="jersey-robot"></div>
  </div>

</div>

</body>
</html>
