<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Animado - NeurAI Dev</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a1628;
    }

    /* ── Contenedor principal ── */
    .logo-wrap {
      position: relative;
      width: 400px;
      height: 635px;
      /* 400 * 1263/796 */
      display: inline-block;
    }

    .logo-wrap img.base {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* ── Capa SVG de animaciones superpuesta ── */
    .logo-wrap svg.overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 75%;
      pointer-events: none;
      overflow: visible;
    }

    /* =====================
       ANIMACIONES
    ===================== */

    /* Respiración suave del logo completo */
    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        transform-origin: center;
      }

      50% {
        transform: scale(1.015);
        transform-origin: center;
      }
    }

    /* Glow pulsante del ojo robot */
    @keyframes eyeGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 5px #00cfff) drop-shadow(0 0 10px #00cfff);
      }

      50% {
        filter: drop-shadow(0 0 14px #00eeff) drop-shadow(0 0 28px #00eeff) drop-shadow(0 0 10px rgba(0, 220, 255, 0.55));
      }
    }

    /* Pulso del iris (radio animado con transform) */
    @keyframes irisPulse {

      0%,
      100% {
        transform: scale(1);
        transform-origin: 525px 468px;
      }

      50% {
        transform: scale(1.5);
        transform-origin: 525px 468px;
      }
    }

    /* Scanline que barre el ojo */
    @keyframes scanline {
      0% {
        transform: translateY(-100px);
        opacity: 0;
      }

      8% {
        opacity: 0.55;
      }

      92% {
        opacity: 0.55;
      }

      100% {
        transform: translateY(100px);
        opacity: 0;
      }
    }

    /* Parpadeo ocasional de segmentos */
    @keyframes segFlicker {

      0%,
      90%,
      100% {
        opacity: 1;
      }

      91% {
        opacity: 0.2;
      }

      92% {
        opacity: 1;
      }

      94% {
        opacity: 0.5;
      }

      95% {
        opacity: 1;
      }
    }

    /* Destello especular del ojo */
    @keyframes glint {

      0%,
      78%,
      100% {
        opacity: 0;
        transform: scale(1);
        transform-origin: 498px 438px;
      }

      83% {
        opacity: 1;
        transform: scale(1.4);
        transform-origin: 498px 438px;
      }

      88% {
        opacity: 0;
        transform: scale(1);
        transform-origin: 498px 438px;
      }
    }

    /* Halo de energía en el anillo exterior */
    @keyframes ringPulse {

      0%,
      100% {
        stroke-width: 3;
        opacity: 0.7;
      }

      50% {
        stroke-width: 7;
        opacity: 0.2;
      }
    }

    /* Parpadeo del LED azul central */
    @keyframes corePulse {

      0%,
      100% {
        opacity: 1;
        r: 10;
      }

      50% {
        opacity: 0.6;
        r: 13;
      }
    }

    /* Rastro de energía en segmentos */
    @keyframes energyTrace {
      0% {
        stroke-dashoffset: 300;
        opacity: 0;
      }

      10% {
        opacity: 0.8;
      }

      90% {
        opacity: 0.8;
      }

      100% {
        stroke-dashoffset: 0;
        opacity: 0;
      }
    }

    /* =====================
       CLASES DE ANIMACIÓN
    ===================== */
    .logo-wrap {
      animation: breathe 4.5s ease-in-out infinite;
    }

    .eye-glow-group {
      animation: eyeGlow 2.8s ease-in-out infinite;
    }

    .iris-pulse {
      animation: irisPulse 2.8s ease-in-out infinite;
    }

    .scanline-bar {
      animation: scanline 3s linear infinite;
    }

    .seg-lines {
      animation: segFlicker 8s ease-in-out infinite;
    }

    .eye-glint {
      animation: glint 5.5s ease-in-out infinite;
    }

    .eye-ring-pulse {
      animation: ringPulse 2.8s ease-in-out infinite;
    }

    .core-pulse {
      animation: corePulse 2.8s ease-in-out infinite;
    }

    .energy-trace {
      stroke-dasharray: 300;
      animation: energyTrace 4s linear infinite;
    }
  </style>
</head>

<body>

  <div class="logo-wrap">

    <!-- 1. Imagen original como base -->
    <img class="base" src="logo-original.png" alt="NeurAI Dev Logo">

    <!--
    2. SVG superpuesto con animaciones.
       viewBox = 796×1263 (tamaño real del PNG).
       Así las coordenadas coinciden pixel a pixel con la imagen.
  -->
    <svg class="overlay" viewBox="0 -240 660 1263" xmlns="http://www.w3.org/2000/svg">
      <defs>

        <!-- Clip que limita el scanline al interior del ojo robot -->
        <clipPath id="eyeClip">
          <circle cx="525" cy="468" r="104" />
        </clipPath>

        <!-- Gradiente radial para el halo del ojo -->
        <radialGradient id="eyeHalo" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00eeff" stop-opacity="0.0" />
          <stop offset="70%" stop-color="#00bbff" stop-opacity="0.0" />
          <stop offset="100%" stop-color="#0088ff" stop-opacity="0.4" />
        </radialGradient>

        <!-- Gradiente para los trazos de energía -->
        <linearGradient id="energyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00eeff" stop-opacity="0" />
          <stop offset="50%" stop-color="#00eeff" stop-opacity="1" />
          <stop offset="100%" stop-color="#00eeff" stop-opacity="0" />
        </linearGradient>

        <filter id="blur3">
          <feGaussianBlur stdDeviation="3" />
        </filter>
        <filter id="blur6">
          <feGaussianBlur stdDeviation="6" />
        </filter>
        <filter id="blur10">
          <feGaussianBlur stdDeviation="10" />
        </filter>
      </defs>

      <!-- ══════════════════════════════════════
         OJO ROBOT
         Centro real en imagen: ~(496, 430)
         Radio exterior visible: ~104px
    ══════════════════════════════════════ -->
      <g class="eye-glow-group">

        <!-- Halo exterior difuso -->
        <circle cx="525" cy="468" r="130" fill="url(#eyeHalo)" filter="url(#blur10)" opacity="0.6" />

        <!-- Anillo exterior pulsante (encima del dibujo, muy sutil) -->
        <circle cx="525" cy="468" r="108" fill="none" stroke="#00ccff" stroke-width="3" opacity="0.35"
          class="eye-ring-pulse" />

        <!-- Anillo interior extra glow -->
        <circle cx="525" cy="468" r="76" fill="none" stroke="#00eeff" stroke-width="2" opacity="0.3"
          filter="url(#blur3)" />

        <!-- Iris — pulso de tamaño -->
        <circle cx="525" cy="468" r="58" fill="none" stroke="#00ddff" stroke-width="1.5" opacity="0.25"
          class="iris-pulse" />

        <!-- Núcleo central — pulso de brillo -->
        <circle cx="525" cy="468" r="10" fill="#c0f8ff" opacity="0.5" filter="url(#blur6)" class="core-pulse" />

        <!-- Scanline que barre el ojo -->
        <g clip-path="url(#eyeClip)">
          <rect class="scanline-bar" x="421" y="468" width="208" height="3" fill="#00eeff" opacity="0.5" rx="1.5" />
        </g>

        <!-- Destello especular (brillo blanco) -->
        <ellipse class="eye-glint" cx="498" cy="438" rx="14" ry="8" fill="white" opacity="0.75" filter="url(#blur3)" />

      </g>

      <!-- ══════════════════════════════════════
         SEGMENTOS ROBOT — trazos de energía
         Lado derecho de la cara
    ══════════════════════════════════════ -->
      <g class="seg-lines" opacity="0.55">

        <!-- Línea panel temporal superior -->
        <line x1="398" y1="185" x2="600" y2="260" stroke="#00aadd" stroke-width="2.5" stroke-linecap="round" />

        <!-- Línea panel mejilla -->
        <line x1="398" y1="540" x2="580" y2="570" stroke="#00aadd" stroke-width="2" stroke-linecap="round" />

        <!-- Línea vertical central robot -->
        <line x1="458" y1="195" x2="452" y2="740" stroke="#0088bb" stroke-width="1.5" stroke-linecap="round" />

        <!-- Línea vertical lateral -->
        <line x1="555" y1="220" x2="548" y2="680" stroke="#0088bb" stroke-width="1.5" stroke-linecap="round" />

        <!-- Línea panel mandíbula -->
        <line x1="398" y1="700" x2="570" y2="730" stroke="#00aadd" stroke-width="2" stroke-linecap="round" />

        <!-- Línea curva oreja robot -->
        <path d="M 650 310 Q 680 430 660 560" stroke="#0099cc" stroke-width="2" fill="none" stroke-linecap="round" />

      </g>

      <!-- Trazos de energía animados (corren por los segmentos) -->
      <g opacity="0.6">
        <line class="energy-trace" x1="398" y1="185" x2="600" y2="260" stroke="url(#energyGrad)" stroke-width="2"
          stroke-linecap="round" />

        <line class="energy-trace" x1="458" y1="195" x2="452" y2="740" stroke="#00eeff" stroke-width="1.5"
          stroke-linecap="round" style="animation-delay: 1.2s" />

        <line class="energy-trace" x1="398" y1="700" x2="570" y2="730" stroke="url(#energyGrad)" stroke-width="2"
          stroke-linecap="round" style="animation-delay: 2.5s" />
      </g>

    </svg>
  </div>

</body>

</html>
